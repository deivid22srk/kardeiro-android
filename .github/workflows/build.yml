name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Configure Android SDK
        env:
          ANDROID_SDK_HOME: /tmp/android-home
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          # The ubuntu-latest runner already ships with platforms;android-34
          # and build-tools;34.0.0 preinstalled. We just make sure any missing
          # components are accepted and downloaded if needed.
          yes | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true
          # AGP 8.x tries to create the debug keystore in ~/.config/.android which
          # is not writable on some runner images. Redirect the Android user home
          # to a known-writable location via ANDROID_SDK_HOME.
          mkdir -p /tmp/android-home/.android
          echo "ANDROID_SDK_HOME=/tmp/android-home" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kardeiro-demo-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/
            **/build/outputs/logs/
          retention-days: 7
